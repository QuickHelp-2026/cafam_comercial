<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Centro de Control Operacional — Cafam Domicilios</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B1220;--bg2:#111827;--card:#1E293B;--card2:#162033;
  --blue:#2563EB;--blue2:#3B82F6;--cyan:#06B6D4;
  --green:#10B981;--yellow:#F59E0B;--red:#EF4444;--purple:#8B5CF6;
  --txt:#FFFFFF;--sub:#94A3B8;--mut:#64748B;
  --border:rgba(148,163,184,0.12);--glow:rgba(37,99,235,0.4);
}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--txt);overflow:hidden;height:100vh}
h1,h2,h3,h4{font-family:'Sora',sans-serif}
.app{display:flex;height:100vh}
.sidebar{width:230px;background:linear-gradient(180deg,#0d1526,#0B1220);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width 0.3s cubic-bezier(0.4,0,0.2,1);flex-shrink:0;z-index:50}
.sidebar.collapsed{width:68px}
.sb-head{padding:18px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.sb-logo{width:36px;height:36px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,var(--blue2),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 16px var(--glow)}
.sb-brand{overflow:hidden;white-space:nowrap}
.sb-brand .t{font-family:'Sora',sans-serif;font-weight:800;font-size:14px;letter-spacing:-0.3px}
.sb-brand .s{font-size:10px;color:var(--mut)}
.sb-toggle{margin-left:auto;background:rgba(148,163,184,0.08);border:none;color:var(--sub);width:26px;height:26px;border-radius:7px;cursor:pointer;font-size:13px;flex-shrink:0;transition:all 0.2s}
.sb-toggle:hover{background:rgba(37,99,235,0.2);color:var(--blue2)}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:13px;padding:11px 12px;border-radius:11px;cursor:pointer;color:var(--sub);font-size:13.5px;font-weight:500;margin-bottom:3px;transition:all 0.2s;position:relative;white-space:nowrap;overflow:hidden}
.nav-item .ic{font-size:17px;flex-shrink:0;width:22px;text-align:center}
.nav-item:hover{background:rgba(37,99,235,0.1);color:var(--txt)}
.nav-item.active{background:linear-gradient(135deg,rgba(37,99,235,0.25),rgba(6,182,212,0.1));color:#fff}
.nav-item.active::before{content:'';position:absolute;left:0;top:18%;bottom:18%;width:3px;background:linear-gradient(180deg,var(--blue2),var(--cyan));border-radius:0 3px 3px 0}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:700}
.sb-foot{padding:14px;border-top:1px solid var(--border);font-size:10px;color:var(--mut);text-align:center;white-space:nowrap;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:62px;background:rgba(17,24,39,0.7);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:20px;flex-shrink:0}
.tb-title{font-family:'Sora',sans-serif;font-size:17px;font-weight:700}
.tb-title .sub{font-size:11px;color:var(--mut);font-weight:400;font-family:'Inter'}
.tb-spacer{flex:1}
.tb-clock{text-align:right;font-family:'Sora',sans-serif}
.tb-time{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;background:linear-gradient(135deg,#fff,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tb-date{font-size:10px;color:var(--mut);text-transform:capitalize}
.conn{display:flex;align-items:center;gap:8px;padding:7px 13px;border-radius:10px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25)}
.conn.sync{background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.25)}
.conn.err{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.25)}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
.conn.sync .conn-dot{background:var(--yellow);box-shadow:0 0 8px var(--yellow)}
.conn.err .conn-dot{background:var(--red);box-shadow:0 0 8px var(--red)}
.conn-txt{font-size:11px;font-weight:600;color:var(--green)}
.conn.sync .conn-txt{color:var(--yellow)}
.conn.err .conn-txt{color:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.btn-up{background:linear-gradient(135deg,var(--blue),var(--cyan));border:none;color:#fff;padding:9px 18px;border-radius:10px;cursor:pointer;font-weight:600;font-size:13px;font-family:'Inter';transition:all 0.2s;box-shadow:0 4px 16px var(--glow)}
.btn-up:hover{transform:translateY(-1px);box-shadow:0 6px 24px var(--glow)}
.scroll{flex:1;overflow-y:auto;padding:22px 24px}
.card{background:linear-gradient(145deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:18px;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,0.3);position:relative;overflow:hidden}
.card-t{font-family:'Sora',sans-serif;font-size:12px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:16px;margin-bottom:20px}
.kpi{background:linear-gradient(145deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:18px;padding:18px;position:relative;overflow:hidden;transition:transform 0.25s,box-shadow 0.25s}
.kpi:hover{transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,0.4)}
.kpi-glow{position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;filter:blur(40px);opacity:0.25}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kpi-ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px}
.kpi-trend{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;display:flex;align-items:center;gap:3px}
.kpi-label{font-size:11px;color:var(--sub);font-weight:500;margin-bottom:5px;font-family:'Sora'}
.kpi-val{font-size:30px;font-weight:800;font-family:'Sora';line-height:1;letter-spacing:-1px}
.kpi-sub{font-size:11px;color:var(--mut);margin-top:6px}
.spark{margin-top:10px;height:30px}
.g70-30{display:grid;grid-template-columns:1.6fr 1fr;gap:20px;margin-bottom:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px}
.gcol{display:flex;flex-direction:column;gap:20px}
.map-wrap{position:relative;height:380px;border-radius:14px;overflow:hidden;background:radial-gradient(circle at 40% 40%,#13203a,#0b1220)}
.map-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(37,99,235,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,0.06) 1px,transparent 1px);background-size:32px 32px}
.map-dot{position:absolute;border-radius:50%;transform:translate(-50%,-50%);transition:all 0.3s;cursor:pointer}
.map-dot::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1px solid currentColor;opacity:0.4;animation:ripple 2s infinite}
@keyframes ripple{0%{transform:scale(1);opacity:0.5}100%{transform:scale(2.5);opacity:0}}
.map-legend{position:absolute;bottom:14px;left:14px;display:flex;gap:14px;background:rgba(11,18,32,0.8);padding:8px 14px;border-radius:10px;backdrop-filter:blur(8px)}
.ml-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub)}
.ml-dot{width:9px;height:9px;border-radius:50%}
.alerts-panel{display:flex;flex-direction:column;gap:10px;max-height:380px;overflow-y:auto}
.alert-item{background:var(--card2);border-radius:12px;padding:13px;border-left:3px solid var(--red);transition:all 0.2s;animation:slideIn 0.4s}
.alert-item.warn{border-left-color:var(--yellow)}
.alert-item:hover{background:#1a2740;transform:translateX(2px)}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.alert-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.alert-prio{font-size:9px;font-weight:700;padding:2px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:0.5px}
.alert-time{font-size:10px;color:var(--mut)}
.alert-title{font-size:13px;font-weight:600;margin-bottom:3px}
.alert-meta{font-size:11px;color:var(--sub)}
.alert-action{font-size:11px;color:var(--cyan);margin-top:6px;display:flex;align-items:center;gap:5px}
.hbar-row{display:flex;align-items:center;gap:12px;margin-bottom:11px}
.hbar-label{width:130px;font-size:12px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.hbar-track{flex:1;height:24px;background:rgba(148,163,184,0.06);border-radius:8px;overflow:hidden;display:flex}
.hbar-seg{height:100%;transition:width 0.8s cubic-bezier(0.4,0,0.2,1);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.hbar-val{width:42px;text-align:right;font-size:13px;font-weight:700;font-family:'Sora';flex-shrink:0}
.tbl-wrap{overflow:auto;border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{padding:12px 14px;text-align:left;background:rgba(11,18,32,0.6);color:var(--sub);font-size:10px;text-transform:uppercase;letter-spacing:0.8px;font-weight:600;font-family:'Sora';border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(148,163,184,0.05);transition:background 0.15s}
tbody tr:hover{background:rgba(37,99,235,0.06)}
td{padding:11px 14px;vertical-align:middle}
.avatar{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'Sora';color:#fff;flex-shrink:0}
.badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:10px;font-weight:700;font-family:'Sora';white-space:nowrap}
.perf-dot{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600}
.pd{width:9px;height:9px;border-radius:50%}
.ai-hero{background:linear-gradient(135deg,rgba(37,99,235,0.15),rgba(6,182,212,0.08));border:1px solid rgba(6,182,212,0.2)}
.ai-msgs{min-height:300px;max-height:440px;overflow-y:auto;display:flex;flex-direction:column;gap:13px;margin-bottom:14px;padding:4px}
.m-user{align-self:flex-end;max-width:78%;background:linear-gradient(135deg,var(--blue),#1e40af);padding:12px 16px;border-radius:16px 16px 4px 16px;font-size:13px;line-height:1.55}
.m-ai{align-self:flex-start;max-width:88%;background:var(--card2);border:1px solid var(--border);padding:14px 17px;border-radius:16px 16px 16px 4px;font-size:13px;line-height:1.65;white-space:pre-wrap}
.ai-row{display:flex;gap:10px}
.ai-in{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:12px 16px;color:var(--txt);font-size:13px;outline:none;font-family:'Inter'}
.ai-in:focus{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(37,99,235,0.15)}
.ai-go{background:linear-gradient(135deg,var(--blue),var(--cyan));border:none;color:#fff;padding:12px 22px;border-radius:11px;cursor:pointer;font-weight:600;font-size:13px;font-family:'Inter';transition:all 0.2s}
.ai-go:hover{box-shadow:0 4px 18px var(--glow)}
.ai-go:disabled{opacity:0.4;cursor:not-allowed}
.qchips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.qchip{background:rgba(37,99,235,0.1);border:1px solid rgba(37,99,235,0.25);color:#93c5fd;padding:7px 14px;border-radius:20px;cursor:pointer;font-size:11.5px;transition:all 0.2s;font-family:'Inter'}
.qchip:hover{background:rgba(37,99,235,0.25);color:#fff;transform:translateY(-1px)}
.typing{display:flex;align-items:center;gap:6px;color:var(--mut);font-size:12px;padding:8px}
.dot{width:7px;height:7px;background:var(--cyan);border-radius:50%;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}
.funnel{display:flex;flex-direction:column;gap:8px;align-items:center}
.fn-step{width:100%;border-radius:10px;padding:14px;display:flex;align-items:center;justify-content:space-between;transition:all 0.3s;position:relative}
.fn-label{font-size:13px;font-weight:600;font-family:'Sora'}
.fn-val{font-size:22px;font-weight:800;font-family:'Sora'}
.fn-pct{font-size:11px;opacity:0.8}
.spinner{width:42px;height:42px;border:3px solid rgba(37,99,235,0.2);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e3a6e;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--blue)}
.err-box{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:16px;padding:24px;text-align:center}
.empty{text-align:center;padding:60px 20px;color:var(--mut)}
.empty .ico{font-size:52px;margin-bottom:14px;opacity:0.5}
</style>
</head>
<body>
<div id="root"><div class="loading"><div class="spinner"></div><p style="color:var(--mut)">Inicializando Centro de Control...</p></div></div>
<script>
const SHEET_ID="1Pefd6qXmMmhrAEkOC6mWt0SzB9m1LovZBgWyfeeS45A";
const REFRESH_MS=15*60*1000;
let S={data:[],malla:[],loading:true,error:'',updated:null,view:'dashboard',collapsed:false,conn:'sync',aiMessages:[],aiLoading:false,prevTotal:null};
function parseCSV(raw){if(!raw||!raw.trim())return[];const cl=s=>(s||'').replace(/^"|"$/g,'').trim();const sr=line=>{const c=[];let cur='',q=false;for(const ch of line){if(ch==='"')q=!q;else if(ch===','&&!q){c.push(cl(cur));cur='';}else cur+=ch;}c.push(cl(cur));return c;};const L=raw.split('\n').filter(l=>l.trim());const H=sr(L[0]);return L.slice(1).map(l=>{const v=sr(l);const o={};H.forEach((h,i)=>o[h]=v[i]||'');return o;}).filter(r=>Object.values(r).some(v=>v));}
const pMoney=s=>parseFloat((s||'0').replace(/[^0-9.-]/g,''))||0;
const fM=n=>n>=1e6?'$'+(n/1e6).toFixed(1)+'M':n>=1e3?'$'+Math.round(n/1e3)+'K':'$'+Math.round(n);
const fMF=n=>new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(n);
const fN=n=>(n||0).toLocaleString('es-CO');
const SC={'ENTREGADO':{c:'#10B981',b:'rgba(16,185,129,0.15)'},'RUTA':{c:'#3B82F6',b:'rgba(59,130,246,0.15)'},'REGISTRO':{c:'#F59E0B',b:'rgba(245,158,11,0.15)'},'CANCELAC':{c:'#EF4444',b:'rgba(239,68,68,0.15)'},'DEVOLUCI':{c:'#8B5CF6',b:'rgba(139,92,246,0.15)'},'NOVEDAD':{c:'#F97316',b:'rgba(249,115,22,0.15)'}};
const PIE=['#10B981','#3B82F6','#F59E0B','#EF4444','#8B5CF6','#06B6D4','#F97316','#84CC16','#EC4899'];
function gS(s){if(!s)return{c:'#64748B',b:'rgba(100,116,139,0.1)'};for(const[k,v]of Object.entries(SC))if(s.toUpperCase().includes(k))return v;return{c:'#64748B',b:'rgba(100,116,139,0.1)'};}
function calc(data){const bySt={},byDr={},byMe={},byCi={},byHr={};let tR=0,tP=0;data.forEach(r=>{const e=r.estado||'SIN ESTADO',dr=r.farmacia_asignada||'Sin asignar',me=r.nombre_mensajero||'Sin asignar',ci=r.ciudad||'Sin ciudad',v=pMoney(r.total_a_pagar);const hr=(r.hora_creacion||'').slice(0,2);const E=e.toUpperCase().includes('ENTREGADO'),R=e.toUpperCase().includes('RUTA'),Rg=e.toUpperCase().includes('REGISTRO'),C=e.toUpperCase().includes('CANCELAC');bySt[e]=(bySt[e]||0)+1;if(E)tR+=v;if(C)tP+=v;if(hr&&/^\d+$/.test(hr)){byHr[hr]=byHr[hr]||{total:0,e:0};byHr[hr].total++;if(E)byHr[hr].e++;}if(!byDr[dr])byDr[dr]={total:0,e:0,r:0,reg:0,c:0,rec:0,ci};byDr[dr].total++;if(E){byDr[dr].e++;byDr[dr].rec+=v;}if(R)byDr[dr].r++;if(Rg)byDr[dr].reg++;if(C)byDr[dr].c++;if(!byMe[me])byMe[me]={total:0,e:0,r:0,reg:0,c:0,rec:0,ced:r.cedula_mensajero||'',ci};byMe[me].total++;if(E){byMe[me].e++;byMe[me].rec+=v;}if(R)byMe[me].r++;if(Rg)byMe[me].reg++;if(C)byMe[me].c++;if(!byCi[ci])byCi[ci]={total:0,e:0,rec:0};byCi[ci].total++;if(E){byCi[ci].e++;byCi[ci].rec+=v;}});const alertas=Object.entries(byDr).filter(([,v])=>v.reg>9);return{bySt,byDr,byMe,byCi,byHr,tR,tP,total:data.length,alertas};}
async function loadData(){S.loading=true;S.conn='sync';render();try{const f=sh=>fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${sh}`);const[dr,mr]=await Promise.allSettled([f('DATA'),f('MALLA')]);if(dr.status==='rejected'||!dr.value.ok)throw new Error('No se puede acceder al Sheet. Google Sheets → Compartir → Cualquier persona con el enlace → Lector');S.prevTotal=S.data.length||null;S.data=parseCSV(await dr.value.text());if(mr.status==='fulfilled'&&mr.value.ok)S.malla=parseCSV(await mr.value.text());S.updated=new Date();S.error='';S.conn='ok';}catch(e){S.error=e.message;S.conn='err';}S.loading=false;render();}
async function askAI(q){if(!q||!q.trim())return;S.aiMessages.push({role:'user',text:q.trim()});S.aiLoading=true;render();const st=calc(S.data);const ctx=`OPERACIÓN HOY Cafam:
Total ${st.total} | Recaudado ${fMF(st.tR)} | Pérdida ${fMF(st.tP)}
Estados: ${Object.entries(st.bySt).sort((a,b)=>b[1]-a[1]).map(([k,v])=>k+':'+v).join(', ')}
Alertas >9 REGISTRO: ${st.alertas.length?st.alertas.map(([d,v])=>d.replace(/DROG CAFAM |CAFAM /g,'')+'('+v.reg+')').join(', '):'Ninguna'}
Mensajeros top (Entreg/Ruta/Reg): ${Object.entries(st.byMe).sort((a,b)=>b[1].e-a[1].e).slice(0,8).map(([k,v])=>k.split(' ')[0]+':'+v.e+'/'+v.r+'/'+v.reg).join(' | ')}
Droguerías: ${Object.entries(st.byDr).sort((a,b)=>b[1].total-a[1].total).slice(0,8).map(([k,v])=>k.replace(/DROG CAFAM |CAFAM /g,'').slice(0,14)+':'+v.total).join(' | ')}
Ciudades: ${Object.entries(st.byCi).sort((a,b)=>b[1].total-a[1].total).map(([k,v])=>k+':'+v.total).join(', ')}`;try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1100,system:'Eres copiloto operativo experto en logística de domicilios farmacéuticos en Colombia, estilo centro de control NOC. Recomendaciones concretas, accionables, breves, en español. Usa 🟢🟡🔴✅⚠️ para destacar.',messages:[{role:'user',content:ctx+'\n\nConsulta: '+q.trim()}]})});const j=await res.json();S.aiMessages.push({role:'ai',text:j.content&&j.content[0]?j.content[0].text:'Sin respuesta.'});}catch(e){S.aiMessages.push({role:'ai',text:'❌ Error conectando con IA. Si abres este archivo localmente, el navegador puede bloquear la conexión (CORS). Súbelo a un hosting web para usar la IA.'});}S.aiLoading=false;render();}

}).join('')}</tbody></table></div></div><div class="card"><div class="card-t">🏅 Top 15 — Ranking de Entregas</div>${renderHBars(arr.slice(0,15).map(([k,v])=>({label:k.split(' ').slice(0,2).join(' '),e:v.e,total:v.total})))}</div></div>`;}if(view==='ciudades'){const arr=Object.entries(st.byCi).sort((a,b)=>b[1].total-a[1].total);return`<div class="gcol"><div class="g3">${arr.slice(0,3).map(([k,v],i)=>{const pE=v.total?Math.round(v.e/v.total*100):0;return`<div class="card"><div style="display:flex;justify-content:space-between;align-items:start"><div><div style="font-family:Sora;font-size:18px;font-weight:800">${k}</div><div style="color:var(--mut);font-size:11px">#${i+1} por volumen</div></div><span style="font-size:28px">${['🥇','🥈','🥉'][i]}</span></div><div style="display:flex;gap:18px;margin-top:18px"><div><div style="font-size:24px;font-weight:800;font-family:Sora;color:var(--blue2)">${v.total}</div><div style="font-size:10px;color:var(--mut)">Pedidos</div></div><div><div style="font-size:24px;font-weight:800;font-family:Sora;color:var(--green)">${pE}%</div><div style="font-size:10px;color:var(--mut)">Cumplim.</div></div></div><div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);font-size:12px;color:var(--green);font-weight:600">💰 ${fM(v.rec)} recaudado</div></div>`;}).join('')}</div><div class="card"><div class="card-t">🏙️ Comparativo Territorial</div><div class="tbl-wrap"><table><thead><tr><th>#</th><th>Ciudad</th><th>Pedidos</th><th>Entregados</th><th>Cumplimiento</th><th>Recaudo</th></tr></thead><tbody>${arr.map(([k,v],i)=>{const pE=v.total?Math.round(v.e/v.total*100):0;return`<tr><td style="color:var(--mut)">${i+1}</td><td style="font-weight:600;font-family:Sora">${k}</td><td style="color:var(--blue2);font-weight:700">${v.total}</td><td style="color:var(--green)">${v.e}</td><td><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:6px;background:rgba(148,163,184,0.1);border-radius:3px;max-width:90px"><div style="height:100%;border-radius:3px;background:${pE>=60?'#10B981':pE>=40?'#F59E0B':'#EF4444'};width:${pE}%"></div></div><span style="font-size:11px;font-weight:700">${pE}%</span></div></td><td style="color:var(--green);font-size:12px">${fM(v.rec)}</td></tr>`;}).join('')}</tbody></table></div></div></div>`;}if(view==='productividad'){const hrs=Object.entries(st.byHr).sort((a,b)=>a[0].localeCompare(b[0]));const E=Object.entries(st.bySt).filter(([k])=>k.toUpperCase().includes('ENTREGADO')).reduce((s,[,v])=>s+v,0);const sla=st.total?Math.round(E/st.total*100):0;return`<div class="gcol"><div class="g3"><div class="card" style="text-align:center"><div class="card-t" style="justify-content:center">⚡ Cumplimiento SLA</div>${gauge(sla,'#10B981')}</div><div class="card"><div class="card-t">📦 Pedidos por Hora</div>${lineChart(hrs.map(([k,v])=>({name:k+'h',value:v.total})),360,180,'#3B82F6')}</div><div class="card"><div class="card-t">💰 Recaudo por Hora</div>${lineChart(hrs.map(([k,v])=>({name:k+'h',value:v.e})),360,180,'#10B981')}</div></div><div class="g2"><div class="card"><div class="card-t">🏪 Top Droguerías</div>${renderHBars(Object.entries(st.byDr).sort((a,b)=>b[1].total-a[1].total).slice(0,8).map(([k,v])=>({label:k.replace(/DROG CAFAM |CAFAM /g,''),e:v.e,total:v.total})))}</div><div class="card"><div class="card-t">🛵 Top Mensajeros</div>${renderHBars(Object.entries(st.byMe).sort((a,b)=>b[1].e-a[1].e).slice(0,8).map(([k,v])=>({label:k.split(' ').slice(0,2).join(' '),e:v.e,total:v.total})))}</div></div></div>`;}if(view==='ia'){const qs=['¿Qué mensajeros tienen baja productividad?','¿Qué droguerías necesitan apoyo urgente?','¿Debo reasignar algún mensajero?','¿Cuál ciudad es más productiva?','¿Análisis de ingresos vs pérdidas?','¿Algún turno mal asignado según la demanda?'];return`<div class="gcol"><div class="card ai-hero"><div style="display:flex;align-items:center;gap:14px"><div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 0 24px var(--glow)">🤖</div><div><div style="font-family:Sora;font-size:18px;font-weight:800">Copiloto Operativo IA</div><div style="font-size:12px;color:var(--sub)">Analiza datos en tiempo real y recomienda decisiones</div></div></div></div><div class="card"><div class="card-t">⚡ Consultas Rápidas</div><div class="qchips">${qs.map(q=>`<button class="qchip" onclick="askAI('${q.replace(/'/g,"\\'")}') ">${q}</button>`).join('')}</div></div><div class="card"><div class="card-t">💬 Centro de Decisiones</div><div class="ai-msgs" id="aiMsgs">${!S.aiMessages.length?`<div class="empty"><div class="ico">🤖</div><p>Consulta sobre la operación del día</p><p style="font-size:12px;margin-top:6px;color:#334155">Los datos se analizan en tiempo real desde el Sheet</p></div>`:''}${S.aiMessages.map(m=>`<div style="display:flex;flex-direction:column;align-items:${m.role==='user'?'flex-end':'flex-start'}"><div class="${m.role==='user'?'m-user':'m-ai'}">${m.role==='ai'?'<span style="color:var(--cyan);font-weight:700;margin-right:6px">🤖</span>':''}${m.text}</div></div>`).join('')}${S.aiLoading?`<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>Analizando operación...</span></div>`:''}</div><div class="ai-row"><input class="ai-in" id="aiIn" placeholder="Pregunta sobre la operación..." onkeydown="if(event.key==='Enter')askAI(this.value)"/><button class="ai-go" ${S.aiLoading?'disabled':''} onclick="askAI(document.getElementById('aiIn').value)">Enviar →</button></div></div></div>`;}if(view==='malla'){if(!S.malla.length)return`<div class="card"><div class="empty"><div class="ico">📅</div><p>No se cargó la hoja MALLA.<br>Verifica que exista la pestaña "MALLA" en el Sheet público.</p></div></div>`;const keys=['SEMANA','MES','FECHA','CIUDAD','DROGUERIA','MENSAJERO','TURNO','PLACA'].filter(k=>S.malla[0]&&k in S.malla[0]);return`<div class="card"><div class="card-t">📅 Programación Diaria — ${S.malla.length} registros</div><div class="tbl-wrap" style="max-height:600px"><table><thead><tr>${keys.map(k=>`<th>${k}</th>`).join('')}</tr></thead><tbody>${S.malla.slice(0,400).map(r=>`<tr>${keys.map(k=>{const v=r[k]||'';if(k==='TURNO')return`<td><span class="badge" style="background:rgba(6,182,212,0.15);color:var(--cyan)">${v}</span></td>`;if(k==='CIUDAD')return`<td style="color:var(--blue2);font-weight:500">${v}</td>`;if(k==='MENSAJERO')return`<td style="font-weight:500">${v}</td>`;if(k==='DROGUERIA')return`<td style="color:var(--sub);font-size:11px">${v.replace(/CAFAM |DROG /g,'').slice(0,20)}</td>`;return`<td style="color:var(--sub)">${v}</td>`;}).join('')}</tr>`).join('')}</tbody></table></div></div>`;}return'';}
function kpi(ic,label,val,color,glow,trend,up,spark){return`<div class="kpi"><div class="kpi-glow" style="background:${glow}"></div><div class="kpi-top"><div class="kpi-ic" style="background:${glow.replace('0.5','0.15')};color:${color}">${ic}</div><span class="kpi-trend" style="background:${up?'rgba(16,185,129,0.12)':'rgba(239,68,68,0.12)'};color:${up?'#10B981':'#EF4444'}">${up?'▲':'▼'} ${trend}</span></div><div class="kpi-label">${label}</div><div class="kpi-val" style="color:${color}">${val}</div>${spark||''}</div>`;}
function renderMap(st){const pts=S.data.filter(r=>r.cx&&r.cy&&parseFloat(r.cx)&&parseFloat(r.cy)).slice(0,200);if(!pts.length)return`<div class="map-wrap"><div class="map-grid"></div><div class="empty" style="position:relative;top:35%">Sin coordenadas disponibles en los datos</div></div>`;const xs=pts.map(p=>parseFloat(p.cx)),ys=pts.map(p=>parseFloat(p.cy));const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);const rX=maxX-minX||1,rY=maxY-minY||1;const dots=pts.map(p=>{const x=((parseFloat(p.cx)-minX)/rX)*88+6;const y=92-((parseFloat(p.cy)-minY)/rY)*84;const c=gS(p.estado).c;const sz=p.estado&&p.estado.toUpperCase().includes('REGISTRO')?9:6;return`<div class="map-dot" style="left:${x}%;top:${y}%;width:${sz}px;height:${sz}px;background:${c};color:${c};box-shadow:0 0 10px ${c}"></div>`;}).join('');return`<div class="map-wrap"><div class="map-grid"></div>${dots}<div class="map-legend"><div class="ml-item"><span class="ml-dot" style="background:#10B981"></span>Entregado</div><div class="ml-item"><span class="ml-dot" style="background:#3B82F6"></span>En Ruta</div><div class="ml-item"><span class="ml-dot" style="background:#F59E0B"></span>Registro</div><div class="ml-item"><span class="ml-dot" style="background:#EF4444"></span>Crítico</div></div></div>`;}
function renderAlerts(st,full){const items=[];st.alertas.forEach(([d,v])=>items.push({prio:'CRÍTICO',pc:'#EF4444',warn:false,title:`${v.reg} servicios en REGISTRO`,meta:`${d.replace(/DROG CAFAM |CAFAM /g,'')} · ${v.ci}`,action:'Reasignar mensajero de apoyo'}));Object.entries(st.byMe).filter(([,v])=>v.reg>4).slice(0,full?20:3).forEach(([m,v])=>items.push({prio:'ATENCIÓN',pc:'#F59E0B',warn:true,title:`Mensajero con ${v.reg} en registro`,meta:`${m} · ${v.ci}`,action:'Validar tiempo en ruta'}));Object.entries(st.byDr).filter(([,v])=>v.c>5).slice(0,full?20:2).forEach(([d,v])=>items.push({prio:'ATENCIÓN',pc:'#F59E0B',warn:true,title:`${v.c} cancelaciones acumuladas`,meta:`${d.replace(/DROG CAFAM |CAFAM /g,'')} · ${v.ci}`,action:'Revisar causas de cancelación'}));if(!items.length)return`<div class="empty" style="padding:40px"><div class="ico" style="font-size:40px">✅</div><p>Sin alertas activas</p><p style="font-size:11px;color:#334155">Operación dentro de parámetros normales</p></div>`;const now=new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});return items.map(a=>`<div class="alert-item ${a.warn?'warn':''}"><div class="alert-head"><span class="alert-prio" style="background:${a.pc}20;color:${a.pc}">${a.prio}</span><span class="alert-time">${now}</span></div><div class="alert-title">${a.warn?'🟡':'🔴'} ${a.title}</div><div class="alert-meta">${a.meta}</div><div class="alert-action">→ ${a.action}</div></div>`).join('');}
function renderHBars(data){const mx=Math.max(...data.map(d=>d.total),1);return data.map(d=>`<div class="hbar-row"><span class="hbar-label">${d.label}</span><div class="hbar-track"><div class="hbar-seg" style="width:${d.e/mx*100}%;background:linear-gradient(90deg,#10B981,#34d399)">${d.e}</div><div class="hbar-seg" style="width:${(d.total-d.e)/mx*100}%;background:rgba(59,130,246,0.3)"></div></div><span class="hbar-val">${d.total}</span></div>`).join('');}
function renderFunnel(reg,ruta,ent,total){const steps=[['Registro',reg+ruta+ent,'#F59E0B'],['En Ruta',ruta+ent,'#3B82F6'],['Entregado',ent,'#10B981']];const mx=steps[0][1]||1;return`<div class="funnel">${steps.map((s)=>{const w=Math.max(40,s[1]/mx*100);const pct=Math.round(s[1]/mx*100);return`<div class="fn-step" style="width:${w}%;background:linear-gradient(135deg,${s[2]}30,${s[2]}10);border:1px solid ${s[2]}40"><span class="fn-label" style="color:${s[2]}">${s[0]}</span><div style="text-align:right"><div class="fn-val" style="color:${s[2]}">${s[1]}</div><div class="fn-pct" style="color:${s[2]}">${pct}%</div></div></div>`;}).join('')}</div>`;}
function gauge(pct,color){const r=60,c=2*Math.PI*r,off=c-(pct/100)*c;return`<svg width="160" height="160" viewBox="0 0 160 160"><circle cx="80" cy="80" r="${r}" fill="none" stroke="rgba(148,163,184,0.1)" stroke-width="12"/><circle cx="80" cy="80" r="${r}" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 80 80)" style="transition:stroke-dashoffset 1s"/><text x="80" y="76" text-anchor="middle" fill="#fff" font-size="32" font-weight="800" font-family="Sora">${pct}%</text><text x="80" y="98" text-anchor="middle" fill="#64748B" font-size="11">cumplimiento</text></svg>`;}
function setView(v){S.view=v;render();}
function toggleSb(){S.collapsed=!S.collapsed;render();}
function updateClock(){const el=document.getElementById('clock'),de=document.getElementById('cdate');if(el){const n=new Date();el.textContent=n.toLocaleTimeString('es-CO',{hour12:false});if(de)de.textContent=n.toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'});}}
setInterval(updateClock,1000);
setInterval(loadData,REFRESH_MS);
loadData();
</script>
</body>
</html>
